<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kopfalgebra Attack</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- KaTeX for Math Rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

    <style>
        /* Verhindert Scrollen und Zoomen auf dem iPad */
        body {
            overscroll-behavior-y: contain;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Animation für das Hereinfliegen der Antworten (Jack Attack Style) */
        @keyframes jackZoom {
            0% { transform: translate(-50%, -50%) scale(0.1); opacity: 0; filter: blur(10px); }
            40% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; filter: blur(0px); }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        .answer-zoom {
            animation: jackZoom 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Feedback Animationen */
        @keyframes popScore {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(2); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }
        .animate-score {
            animation: popScore 1s ease-out forwards;
        }
        
        .katex-display {
            margin: 0 !important;
        }

        /* Verhindert das Umbrechen innerhalb von Formeln */
        .katex {
            white-space: nowrap;
        }
    </style>
</head>
<body class="bg-slate-900 text-white overflow-hidden h-screen w-screen flex flex-col font-sans">

    <!-- START SCREEN -->
    <div id="start-screen" class="absolute inset-0 z-50 bg-slate-900 flex flex-col items-center justify-center">
        <h1 class="text-6xl md:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-blue-500 mb-8 text-center px-4">
            Kopfalgebra<br>Attack
        </h1>
        <p class="text-xl md:text-2xl text-slate-400 mb-12 max-w-2xl text-center px-6">
            Ein 2-Spieler Duell. Das iPad liegt flach zwischen euch. 
            Tippt auf eure Seite, sobald die <b>richtige</b> Antwort in der Mitte erscheint. 
            Falsche Antworten geben Minuspunkte!
        </p>
        <button onclick="startGame()" class="px-12 py-6 bg-green-500 hover:bg-green-400 text-white text-3xl font-bold rounded-full shadow-[0_0_40px_rgba(34,197,94,0.5)] transition-transform transform hover:scale-105 active:scale-95">
            SPIEL STARTEN
        </button>
    </div>

    <!-- GAME UI -->
    <div id="game-ui" class="flex-1 flex w-full h-full hidden">
        
        <!-- PLAYER 1 (LEFT) -->
        <div id="btn-p1" class="w-1/4 h-full bg-red-700 relative flex flex-col justify-center items-center shadow-[inset_-15px_0_30px_rgba(0,0,0,0.6)] cursor-pointer">
            <h2 class="text-4xl md:text-6xl font-black text-white/30 tracking-widest uppercase rotate-180" style="writing-mode: vertical-rl;">Spieler 1</h2>
            <div id="score-p1" class="text-6xl md:text-8xl font-black mt-8 text-white drop-shadow-lg">0</div>
            <div id="ready-p1" class="absolute bottom-[15%] text-lg md:text-2xl font-bold text-white/50 pointer-events-none transition-colors duration-300 text-center leading-tight"></div>
            
            <div id="flash-p1" class="absolute inset-0 bg-white opacity-0 pointer-events-none transition-opacity duration-200"></div>
            <div id="floating-score-p1" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-7xl font-black pointer-events-none opacity-0"></div>
        </div>

        <!-- CENTER ARENA -->
        <div class="w-2/4 h-full bg-slate-800 flex flex-col relative shadow-2xl z-10 border-x-4 border-slate-950">
            
            <!-- Question Box -->
            <div class="h-1/3 flex items-center justify-center p-4 md:p-6 bg-slate-800 border-b-2 border-slate-700 shadow-md">
                <div id="question-text" class="text-[clamp(1.2rem,2.5vw,2.5rem)] leading-snug font-bold text-center w-full flex flex-col justify-center items-center"></div>
            </div>

            <!-- Jack Attack Answer Area -->
            <div id="answer-arena" class="h-1/3 relative flex items-center justify-center overflow-hidden">
                <!-- Answers will pop up here via JS -->
            </div>

            <!-- Feedback & Next Button Area -->
            <div class="h-1/3 p-4 md:p-6 flex flex-col items-center justify-center bg-slate-800 border-t-2 border-slate-700">
                <div id="explanation-box" class="text-xl md:text-3xl text-center text-slate-300 hidden mb-6 font-medium px-4"></div>
                <button id="next-btn" onclick="nextRound()" class="hidden px-8 py-4 bg-blue-600 hover:bg-blue-500 text-white text-xl md:text-2xl font-bold rounded-xl shadow-lg transform transition active:scale-95">
                    Nächste Aufgabe
                </button>
            </div>
        </div>

        <!-- PLAYER 2 (RIGHT) -->
        <div id="btn-p2" class="w-1/4 h-full bg-blue-700 relative flex flex-col justify-center items-center shadow-[inset_15px_0_30px_rgba(0,0,0,0.6)] cursor-pointer">
            <h2 class="text-4xl md:text-6xl font-black text-white/30 tracking-widest uppercase" style="writing-mode: vertical-rl;">Spieler 2</h2>
            <div id="score-p2" class="text-6xl md:text-8xl font-black mt-8 text-white drop-shadow-lg">0</div>
            <div id="ready-p2" class="absolute bottom-[15%] text-lg md:text-2xl font-bold text-white/50 pointer-events-none transition-colors duration-300 text-center leading-tight"></div>
            
            <div id="flash-p2" class="absolute inset-0 bg-white opacity-0 pointer-events-none transition-opacity duration-200"></div>
            <div id="floating-score-p2" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-7xl font-black pointer-events-none opacity-0"></div>
        </div>

    </div>

    <script>
        // --- MASSIVE DATA EXTRACTION FROM PDF ---
        // Format: [Frage, Richtige Antwort, Falsche Antworten (Pipe-separiert), Erklärung]
        const rawData = [
            // Grafische Aufgaben mit SVGs
            ["Welche Begriffe passen zur Figur?<br><svg viewBox='0 0 100 50' class='max-h-[14vh] mx-auto my-4 drop-shadow-lg text-yellow-400'><polygon points='20,40 80,40 90,10 30,10' fill='none' stroke='currentColor' stroke-width='4'/></svg>", "Parallelogramm, Viereck", "Raute, Rechteck|Quadrat, Raute|Rechteck, Viereck", "Ein Parallelogramm ist ein Viereck mit parallelen Gegenseiten."],

            ["Bestimme die Höhe $h$ im gleichschenkligen Dreieck:<br><svg viewBox='0 0 100 100' class='max-h-[14vh] mx-auto my-4 drop-shadow-lg text-red-400'><polygon points='10,90 90,90 50,10' fill='none' stroke='currentColor' stroke-width='3'/><line x1='50' y1='10' x2='50' y2='90' stroke='currentColor' stroke-dasharray='4'/><text x='50' y='102' fill='currentColor' font-size='14' text-anchor='middle'>4</text><text x='75' y='45' fill='currentColor' font-size='14'>5</text><text x='40' y='60' fill='currentColor' font-size='14'>h</text></svg>", "h = \\sqrt{21}", "h = 3|h = \\sqrt{41}|h = 4", "Pythagoras mit halber Basis (2): $h^2 + 2^2 = 5^2 \\Rightarrow h = \\sqrt{25-4}$"],

            ["Bestimme die Länge der Diagonalen $d$:<br><svg viewBox='0 0 100 50' class='max-h-[14vh] mx-auto my-4 drop-shadow-lg text-orange-400'><rect x='10' y='10' width='80' height='30' fill='none' stroke='currentColor' stroke-width='3'/><line x1='10' y1='40' x2='90' y2='10' stroke='currentColor' stroke-dasharray='4'/><text x='50' y='52' fill='currentColor' font-size='14'>5</text><text x='95' y='30' fill='currentColor' font-size='14'>2</text></svg>", "d = \\sqrt{29}", "d = \\sqrt{21}|d = 7|d = 3", "Pythagoras: $d^2 = 5^2 + 2^2 = 25 + 4 = 29$"],

            ["Löse nach x auf: $3^x=17$", "x = \\log_3(17)", "x = \\frac{17}{3}|x = \\sqrt[3]{17}|x = \\log_{17}(3)", "Anwendung der Definition des Logarithmus."],
            ["Wie viel Prozent sind 40 von 160?", "25\\%", "40\\%|20\\%|33{,}3\\%", "$\\frac{40}{160} = \\frac{1}{4} = 25\\%$"],
            ["Schreibe als eine Potenz: $\\frac{10^3 \\cdot 10^{-5}}{10^2}$", "10^{-4}", "10^{-10}|10^0|10^{-2}", "Zähler: $10^{-2}$. Geteilt durch $10^2$ ergibt $10^{-4}$"],
            ["Berechne $\\lg(500) - \\lg(5)$", "2", "100|1|0", "Logarithmusgesetz: $\\lg(\\frac{500}{5}) = \\lg(100) = 2$"]
        ];

        // Daten parsen für das Spiel
        const allQuestions = rawData.map(row => ({ 
            q: row[0], 
            a: row[1], 
            w: row[2].split('|'), 
            exp: row[3] 
        }));

        // --- GAME STATE ---
        let questions = [];
        let currentQIndex = 0;
        let scores = { p1: 0, p2: 0 };
        let gameState = 'start'; // 'start', 'ready_check', 'playing', 'feedback'
        
        let p1Ready = false;
        let p2Ready = false;

        let loopTimeout = null;
        let currentAnswerObj = null; // { text: "...", isCorrect: boolean }
        let wrongShownCount = 0;
        let activeAnswerElement = null;

        // --- HELPER FUNCTIONS ---
        // Rendert Text mit Inline-Math (eingeschlossen in $) - Erhält HTML-Tags (wie SVGs)
        function renderMixedText(str) {
            return str.replace(/\$(.*?)\$/g, (match, math) => {
                return katex.renderToString(math, { throwOnError: false });
            });
        }

        // Rendert einen reinen Mathematik-String (groß)
        function renderMath(str) {
            // Check if string contains regular text and math mixed
            if (str.includes('\\text{') || !str.match(/[a-zA-Z]/) || str.includes('\\') || str.includes('^')) {
                return katex.renderToString(str, { throwOnError: false, displayMode: true });
            }
            // Fallback for plain text answers
            return str;
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // --- CORE GAME LOGIC ---
        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            
            questions = shuffle([...allQuestions]);
            currentQIndex = 0;
            scores = { p1: 0, p2: 0 };
            updateScoreUI();
            
            nextRound();
        }

        function nextRound() {
            if (currentQIndex >= questions.length) {
                // Game Over Loop
                questions = shuffle([...allQuestions]);
                currentQIndex = 0;
            }

            gameState = 'ready_check';
            p1Ready = false;
            p2Ready = false;
            wrongShownCount = 0;
            currentAnswerObj = null;
            
            // Reset UI
            document.getElementById('explanation-box').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('answer-arena').innerHTML = '<div class="text-lg md:text-2xl text-slate-400 animate-pulse text-center px-4">Lest die Aufgabe.<br><b class="text-white">Beide Spieler</b> müssen tippen, um zu starten!</div>';
            
            const readyP1 = document.getElementById('ready-p1');
            readyP1.innerHTML = "BEREIT?<br>(Tippen)";
            readyP1.classList.remove('text-green-400');
            readyP1.classList.add('text-white/50');
            
            const readyP2 = document.getElementById('ready-p2');
            readyP2.innerHTML = "BEREIT?<br>(Tippen)";
            readyP2.classList.remove('text-green-400');
            readyP2.classList.add('text-white/50');

            // Render Question (kann SVGs enthalten)
            const qData = questions[currentQIndex];
            document.getElementById('question-text').innerHTML = renderMixedText(qData.q);

            // Clear any lingering timeouts
            clearTimeout(loopTimeout);
        }

        function showNextAnswer() {
            if (gameState !== 'playing') return;

            const arena = document.getElementById('answer-arena');
            arena.innerHTML = ''; // Clear previous

            const qData = questions[currentQIndex];
            
            // Determine if we show correct or wrong answer
            // Minimum 2 wrong answers before correct can appear
            let isCorrect = false;
            if (wrongShownCount >= 2) {
                // 30% chance to show correct, or 100% if we've shown 6 wrong ones
                if (Math.random() < 0.3 || wrongShownCount > 6) {
                    isCorrect = true;
                }
            }

            let textToShow = "";
            if (isCorrect) {
                textToShow = qData.a;
                wrongShownCount = 0;
            } else {
                const randomWrongIndex = Math.floor(Math.random() * qData.w.length);
                textToShow = qData.w[randomWrongIndex];
                wrongShownCount++;
            }

            currentAnswerObj = { text: textToShow, isCorrect: isCorrect };

            // Create answer element
            const el = document.createElement('div');
            el.className = 'absolute top-1/2 left-1/2 text-[clamp(2rem,5vw,4.5rem)] font-bold bg-slate-700 px-8 py-6 rounded-2xl shadow-[0_0_30px_rgba(0,0,0,0.8)] border-2 border-slate-600 answer-zoom text-center w-max max-w-[90%]';
            el.innerHTML = renderMath(textToShow);
            
            arena.appendChild(el);
            activeAnswerElement = el;

            // Wait 1.4s, then remove and show next
            loopTimeout = setTimeout(() => {
                if (gameState === 'playing') {
                    if (el && el.parentNode) {
                        el.style.opacity = '0';
                        el.style.transform = 'translate(-50%, -50%) scale(0.5)';
                        el.style.transition = 'all 0.2s';
                    }
                    setTimeout(showNextAnswer, 250); // Gap between answers
                }
            }, 1400);
        }

        function handleTap(playerStr) {
            if (gameState === 'ready_check') {
                // Setze Spieler auf "Bereit"
                if (playerStr === 'p1' && !p1Ready) {
                    p1Ready = true;
                    const el = document.getElementById('ready-p1');
                    el.innerHTML = "BEREIT ✔";
                    el.classList.remove('text-white/50');
                    el.classList.add('text-green-400');
                }
                if (playerStr === 'p2' && !p2Ready) {
                    p2Ready = true;
                    const el = document.getElementById('ready-p2');
                    el.innerHTML = "BEREIT ✔";
                    el.classList.remove('text-white/50');
                    el.classList.add('text-green-400');
                }

                // Wenn beide bereit sind, starte die Runde
                if (p1Ready && p2Ready) {
                    gameState = 'playing';
                    document.getElementById('answer-arena').innerHTML = ''; // Wartetext entfernen
                    document.getElementById('ready-p1').innerHTML = "";
                    document.getElementById('ready-p2').innerHTML = "";
                    loopTimeout = setTimeout(showNextAnswer, 400); // Antworten mit kurzer Verzögerung starten
                }
                return; // Im Ready-Check hier abbrechen
            }

            if (gameState !== 'playing' || !currentAnswerObj) return;

            if (currentAnswerObj.isCorrect) {
                // CORRECT HIT!
                gameState = 'feedback';
                clearTimeout(loopTimeout);
                
                scores[playerStr] += 10;
                updateScoreUI();
                
                // Visual feedback
                triggerFlash(playerStr, 'bg-green-500');
                showFloatingScore(playerStr, "+10", "text-green-400");
                
                if (activeAnswerElement) {
                    activeAnswerElement.classList.remove('bg-slate-700', 'border-slate-600');
                    activeAnswerElement.classList.add('bg-green-600', 'border-green-400', 'shadow-[0_0_50px_rgba(34,197,94,0.8)]');
                }

                // Show Explanation
                const expBox = document.getElementById('explanation-box');
                expBox.innerHTML = renderMixedText(questions[currentQIndex].exp);
                expBox.classList.remove('hidden');
                document.getElementById('next-btn').classList.remove('hidden');
                
                currentQIndex++;

            } else {
                // WRONG HIT!
                scores[playerStr] -= 5;
                updateScoreUI();
                
                triggerFlash(playerStr, 'bg-red-500');
                showFloatingScore(playerStr, "-5", "text-red-400");
                
                // Remove the wrong answer instantly and show next to keep pace fast
                clearTimeout(loopTimeout);
                if (activeAnswerElement && activeAnswerElement.parentNode) {
                    activeAnswerElement.parentNode.removeChild(activeAnswerElement);
                }
                currentAnswerObj = null;
                setTimeout(showNextAnswer, 200);
            }
        }

        // --- UI EFFECTS ---
        function updateScoreUI() {
            document.getElementById('score-p1').innerText = scores.p1;
            document.getElementById('score-p2').innerText = scores.p2;
        }

        function triggerFlash(player, colorClass) {
            const flash = document.getElementById(`flash-${player}`);
            flash.className = `absolute inset-0 pointer-events-none transition-opacity duration-100 opacity-60 ${colorClass}`;
            setTimeout(() => {
                flash.className = `absolute inset-0 pointer-events-none transition-opacity duration-500 opacity-0 bg-white`;
            }, 100);
        }

        function showFloatingScore(player, text, colorClass) {
            const el = document.getElementById(`floating-score-${player}`);
            
            // Reset animation
            el.classList.remove('animate-score');
            void el.offsetWidth; // trigger reflow
            
            el.innerText = text;
            el.className = `absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-7xl md:text-9xl font-black pointer-events-none ${colorClass} animate-score drop-shadow-[0_0_15px_rgba(0,0,0,1)]`;
        }

        // --- EVENT LISTENERS ---
        // Mouse and Touch Events for robust iPad functionality
        const btnP1 = document.getElementById('btn-p1');
        const btnP2 = document.getElementById('btn-p2');

        function bindButton(element, player) {
            const handler = (e) => {
                e.preventDefault(); // Verhindert double-firing auf Touch-Geräten
                handleTap(player);
            };
            element.addEventListener('touchstart', handler, {passive: false});
            element.addEventListener('mousedown', handler);
        }

        bindButton(btnP1, 'p1');
        bindButton(btnP2, 'p2');

        // Keyboard support for testing on PC
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'a') handleTap('p1');
            if (e.key.toLowerCase() === 'l') handleTap('p2');
            if (e.key === 'Enter' && gameState === 'feedback') nextRound();
        });

    </script>
</body>
</html>
